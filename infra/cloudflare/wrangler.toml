name = "posthog-proxy"
main = "posthog-proxy.js"
compatibility_date = "2024-09-23"

# custom_domain = true tells Cloudflare to provision a CNAME from
# t.spielos.xyz → the worker's edge automatically. No manual DNS record needed.
routes = [
  { pattern = "t.spielos.xyz/*", zone_name = "spielos.xyz", custom_domain = true }
]
