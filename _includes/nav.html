<nav class="nav-bar">
  <a class="plain flex align-center" href="{{ '/' | relative_url }}" style="text-decoration:none;">
    {%- if site.logo -%}
      <img src="{{ site.logo | relative_url }}" alt="logo" class="nav-logo" />
    {%- else -%}
      <span style="font-weight:700;font-size:1.1em;">{{ site.title | split: ' — ' | first }}</span>
    {%- endif -%}
  </a>
  <span class="nav-spacer"></span>
  <span class="nav-links">
    {%- for item in site.data.menu.entries -%}
      <a href="{{ item.url | relative_url }}" class="nav-link">{{ item.title | capitalize }}</a>
    {%- endfor -%}
  </span>
  <a href="/contact/" class="btn btn-primary btn-arrow">Get Spiel</a>
  <button id="theme-toggle" class="theme-toggle" title="Toggle theme (press d)" aria-label="Toggle dark mode" role="switch" aria-checked="true">
    <span class="theme-toggle-track"></span>
    <span class="theme-toggle-knob">
      <svg class="theme-toggle-icon theme-toggle-sun" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
        <path d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z"/>
      </svg>
      <svg class="theme-toggle-icon theme-toggle-moon" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true" style="display:none;">
        <path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"/>
      </svg>
    </span>
  </button>
</nav>
