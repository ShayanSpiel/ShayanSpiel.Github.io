<nav class="nav-bar">
  <a class="plain flex align-center" href="{{ '/' | relative_url }}" style="text-decoration:none;">
    {%- if site.logo -%}
      <img src="{{ site.logo | relative_url }}" alt="logo" class="nav-logo" />
    {%- else -%}
      <span style="font-weight:700;font-size:1.1em;">{{ site.title | split: ' — ' | first }}</span>
    {%- endif -%}
  </a>
  <span class="nav-spacer"></span>
  <span class="nav-links">
    {%- for item in site.data.menu.entries -%}
      <a href="{{ item.url | relative_url }}" class="nav-link">{{ item.title | capitalize }}</a>
    {%- endfor -%}
  </span>
  <a href="/SpielEngine/" class="btn btn-primary btn-arrow">Get Spiel</a>
</nav>
