      <span class="post-meta-sep">·</span>
      <a href="/sitemap/">Sitemap</a>
      <span class="post-meta-sep">·</span>
      <a href="/contact/">Contact</a>
    </div>

    <div class="footer-row">
      <form
        id="subscribe"
        class="footer-email-form"
        action="https://docs.google.com/forms/d/e/1FAIpQLScSAISdLXFTAex_cHMmdMCXQdaMGlwLouLRmptFo_5VcdV_GA/formResponse"
        method="POST"
        target="hidden_iframe"
      >
        <label for="footer-email" class="sr-only">Email</label>
        <input id="footer-email" type="email" name="entry.754901073" placeholder="Enter your email" required autocomplete="email" />
        <input type="hidden" name="entry.2021940811" value="Newsletter" />
        <button type="submit">Sign up</button>
      </form>
    </div>

    <div class="footer-row">
      <button id="theme-toggle" class="theme-toggle" title="Toggle theme (press d)" aria-label="Toggle dark mode" role="switch" aria-checked="true">
        <span class="theme-toggle-track"></span>
        <span class="theme-toggle-knob">
          <svg class="theme-toggle-icon theme-toggle-sun" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
            <path d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z"/>
          </svg>
          <svg class="theme-toggle-icon theme-toggle-moon" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true" style="display:none;">

    </div>

    <div class="footer-copy">&copy; 2026 Shayan Spiel</div>
  </div>

  <iframe name="hidden_iframe" id="hidden_iframe" title="waitlist-submit" hidden></iframe>

  <script>
    (function () {
      var SUBMIT_TIMEOUT_MS = 6000;
      var form = document.getElementById("subscribe");
      var iframe = document.getElementById("hidden_iframe");
      if (!form || !iframe) return;

      var btn = form.querySelector("button");
      var input = form.querySelector('input[type="email"]');
      var originalLabel = btn ? btn.textContent : "";
      var pendingTimeout = null;

      function setLabel(text) { if (btn) btn.textContent = text; }
      function lock() { if (btn) { btn.disabled = true; setLabel("Sending…"); } }
      function unlock() { if (btn) { btn.disabled = false; setLabel(originalLabel); } }
      function succeed() {
        if (pendingTimeout) { clearTimeout(pendingTimeout); pendingTimeout = null; }
        setLabel("Subscribed ✓");
        if (input) input.value = "";
        if (btn) btn.disabled = true;
      }
      function fail() {
        if (pendingTimeout) { clearTimeout(pendingTimeout); pendingTimeout = null; }
        unlock();
        if (input) input.focus();
        alert("Hmm, didn't go through. Check your connection and retry.");
      }

      iframe.addEventListener("load", function () {
        if (pendingTimeout) { clearTimeout(pendingTimeout); pendingTimeout = null; }
        succeed();
      });

      form.addEventListener("submit", function (e) {
        e.preventDefault();
        var email = (input && input.value || "").trim();
        if (!email) { if (input) input.focus(); return; }
        if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
          if (input) input.focus();
          alert("That email doesn't look right.");
          return;
        }
        lock();
        pendingTimeout = setTimeout(fail, SUBMIT_TIMEOUT_MS);
        form.submit();
      });
    })();
  </script>
</footer>
