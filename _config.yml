title: Shayan Spiel
tagline: Second brain + content engine for solo operators
description: >-
  Solo operator building second brains, content engines, and AI agents. Writing
  in the open. Based in Tehran, Iran.
keywords: second brain, content engine, AI agents, solo operator, building in public, Shayan Spiel, Shayan Tawabi
author: Shayan Tawabi
email: 66shayan@gmail.com
url: https://shayanspiel.github.io
baseurl: ""
lang: en
logo: /logo.png

permalink: /:title/
paginate_path: /page/:num/

favicon: /logo.png

twitter:
  username: ShayanSpiel
  card: summary_large_image

social:
  name: Shayan Tawabi
  links:
    - https://twitter.com/ShayanSpiel
    - https://www.linkedin.com/in/shayantawabi

remote_theme: riggraz/no-style-please

theme_config:
  appearance: "dark"
  back_home_text: ".."
  date_format: "%b %-d, %Y"
  show_description: true
  lowercase_titles: false

sass:
  style: compressed

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap
  - jektex

jektex:
  cache_dir: ".jektex-cache"
  ignore: ["*.xml", "*.json"]
  silent: false
  macros:
    - ["\\Q", "\\mathbb{Q}"]
    - ["\\C", "\\mathbb{C}"]
