title: Shayan Spiel
tagline: Building & testing agentic AI workflows in public
description: >-
  Solo operator building Session-as-Content Infrastructure for technical
  founders. Open-source Spiel Engine + done-for-you installs. Writing in the
  open. Based in Tehran, Iran.
keywords: ai content pipeline, content automation for developers, jekyll blog automation, build in public automation, agentic AI workflow, open source writing pipeline, technical founder marketing, session as content

url: https://shayanspiel.github.io
baseurl: ""
lang: en
locale: en_US
logo: /logo.png   # cleaned Spiel logo (200x200, transparent bg)
favicon: /assets/favicons/favicon.svg
permalink: /:title/
paginate_path: /page/:num/

# Author — jekyll-seo-tag reads `author.name` and (in 2.8.0+) `author.twitter`
author:
  name: Shayan Spiel
  email: 66shayan@gmail.com
  twitter: ShayanSpiel

twitter:
  username: ShayanSpiel
  card: summary_large_image

social:
  name: Shayan Spiel (Shayan Tawabi)
  links:
    - https://twitter.com/ShayanSpiel
    - https://www.linkedin.com/in/shayantawabi
    - https://github.com/ShayanSpiel

remote_theme: riggraz/no-style-please

theme_config:
  appearance: "dark"
  back_home_text: ".."
  date_format: "%b %-d, %Y"
  show_description: true
  lowercase_titles: false

sass:
  style: compressed

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

# Per-page SEO defaults (consumed by jekyll-seo-tag)
# Note: do NOT set `author:` here as a string — it overrides the hash above
# and breaks twitter:creator. Author is inherited from the top-level author hash.
defaults:
  - scope:
      path: ""
    values:
      image:
        path: /assets/og-default.png
        width: 1200
        height: 630
      seo:
        type: "WebSite"
  - scope:
      type: posts
    values:
      image:
        path: /assets/og-default.png
        width: 1200
        height: 630
      seo:
        type: "BlogPosting"

# Allow future-dated posts (SpielEngine publishes as generated)
future: true

# Don't let Jekyll exclude files/dirs starting with a dot (.well-known, etc.)
include:
  - .well-known
