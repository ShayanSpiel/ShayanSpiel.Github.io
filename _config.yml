title: Shayan Spiel
tagline: Session-as-Content Infrastructure for Technical Founders
description: >-
  Solo operator building Session-as-Content Infrastructure for technical
  founders. Open-source Spiel Engine + done-for-you installs. Writing in the
  open. Based in Tehran, Iran.
keywords: ai content pipeline, content automation for developers, jekyll blog automation, build in public automation, agentic AI workflow, open source writing pipeline, technical founder marketing, session as content

url: https://shayanspiel.github.io
baseurl: ""
lang: en
locale: en_US
logo: /assets/logos/primary-transparent.svg
favicon: /assets/favicons/favicon.svg
permalink: /:title/
paginate_path: /page/:num/

# Author — jekyll-seo-tag reads author.name and author.twitter
author:
  name: Shayan Spiel
  email: 66shayan@gmail.com
  twitter: ShayanSpiel

twitter:
  username: ShayanSpiel
  card: summary_large_image

social:
  name: Shayan Spiel (Shayan Tawabi)
  links:
    - https://twitter.com/ShayanSpiel
    - https://www.linkedin.com/in/shayantawabi
    - https://github.com/ShayanSpiel

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

# Per-page SEO defaults (consumed by jekyll-seo-tag)
defaults:
  - scope:
      path: ""
    values:
      image:
        path: /assets/og-default.png
        width: 1200
        height: 630
      seo:
        type: "WebSite"
  - scope:
      type: posts
    values:
      image:
        path: /assets/og-default.png
        width: 1200
        height: 630
      seo:
        type: "BlogPosting"

# Allow future-dated posts
future: true

# Don't let Jekyll exclude files/dirs starting with a dot
include:
  - .well-known

# Exclude from build
exclude:
  - home-landing.html
  - variant-5-ultra-minimal.html
  - Gemfile
  - Gemfile.lock
  - README.md
  - assets/js/mouse_coords.js
  - assets/css/main.css.map
