title: Shayan Spiel
tagline: AI Market Notes, Agent Systems & Founder Projects
description: >-
  Sharp notes on the AI market: model wars, open weights, agents, evals,
  context engineering, inference economics, founder distribution, and
  projects from the gaps. 8+ years scaling Iran's largest digital platforms.
keywords: Shayan Spiel, Shayan Tawabi, AI market, AI model war, AI agents, agent evals, LLM evals, context engineering, prompt caching, open-weight models, inference economics, AI model pricing, technical founder marketing, founder distribution, product as distribution, agent tracing, AI infrastructure, Spiel OS

url: https://spielos.xyz
baseurl: ""
lang: en
locale: en_US
logo: /assets/logos/personal/primary-transparent.svg
favicon: /assets/favicons/favicon.svg
permalink: /:title/
paginate_path: /page/:num/

# Author, jekyll-seo-tag reads author.name and author.twitter
author:
  name: Shayan Spiel
  email: 66shayan@gmail.com
  twitter: ShayanSpiel

twitter:
  username: ShayanSpiel
  card: summary_large_image

social:
  name: Shayan Spiel (Shayan Tawabi)
  links:
    - https://twitter.com/ShayanSpiel
    - https://www.linkedin.com/in/shayantawabi
    - https://github.com/ShayanSpiel

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-redirect-from

# Per-page SEO defaults (consumed by jekyll-seo-tag)
defaults:
  - scope:
      path: ""
    values:
      image:
        path: /assets/og-default.png?v=2
        width: 1200
        height: 630
      seo:
        type: "WebSite"
  - scope:
      type: posts
    values:
      image:
        path: /assets/og-default.png?v=2
        width: 1200
        height: 630
      seo:
        type: "BlogPosting"

# Allow future-dated posts
future: true

# Don't let Jekyll exclude files/dirs starting with a dot
include:
  - .well-known

# Exclude from build
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - assets/js/mouse_coords.js
  - assets/css/main.css.map
  - assets/logos/preview.html
  - infra/
  - _tools
  - _tools/DESIGN-SYSTEM-PLAN.md
  - scripts
  - design-system/components.json
  - _drafts
  - _tools/preview
