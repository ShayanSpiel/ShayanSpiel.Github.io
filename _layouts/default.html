<!DOCTYPE html>
<html lang="{{ site.lang | default: 'en' }}">
  {%- include head.html -%}
  <body class="theme-dark">
    <script>
      if (localStorage.theme === 'light' || (!('theme' in localStorage) && false)) {
        document.body.classList.remove('theme-dark');
        document.body.classList.add('theme-light');
      }
    </script>

    {%- include nav.html -%}

    <main>
      <div class="wrap">
        {{ content }}
      </div>
    </main>

    {%- include footer.html -%}

    <script>
      var darkModeToggle = document.querySelector("#theme-toggle");
      function toggleTheme() {
        document.body.classList.toggle("theme-dark");
        document.body.classList.toggle("theme-light");
        updateThemeState();
      }
      function updateThemeState() {
        let isDark = document.body.classList.contains("theme-dark");
        localStorage.setItem("theme", isDark ? "dark" : "light");
        if (darkModeToggle) darkModeToggle.setAttribute("aria-checked", isDark.toString());
      }
      if (darkModeToggle) {
        darkModeToggle.addEventListener("click", toggleTheme);
        darkModeToggle.setAttribute("aria-checked",
          document.body.classList.contains("theme-dark").toString());
      }
      window.addEventListener('keydown', function(e) {
        if (document.activeElement && (document.activeElement.tagName === 'INPUT' || document.activeElement.tagName === 'TEXTAREA')) return;
        if ((e.key === 'd' || e.key === 'D') && !e.ctrlKey && !e.metaKey) toggleTheme();
      });
    </script>

    {%-if site.goat_counter and jekyll.environment == "production"-%}
      {%-include goat_counter.html-%}
    {%-endif-%}
  </body>
</html>
