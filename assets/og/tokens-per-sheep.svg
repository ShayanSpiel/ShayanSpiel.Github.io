<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="100%" style="stop-color:#1a1a1a"/>
    </linearGradient>
    <linearGradient id="silver" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#888"/>
      <stop offset="50%" style="stop-color:#fff"/>
      <stop offset="100%" style="stop-color:#888"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Grid lines -->
  <g stroke="#1a1a1a" stroke-width="1">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
  </g>
  
  <!-- Main title -->
  <text x="600" y="180" text-anchor="middle" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="72" font-weight="bold" fill="url(#silver)">1,734</text>
  <text x="600" y="240" text-anchor="middle" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="32" fill="#888">tokens per sheep</text>
  
  <!-- Stats row -->
  <g transform="translate(150, 320)">
    <text x="0" y="0" text-anchor="middle" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="48" font-weight="bold" fill="#fff">40.9B</text>
    <text x="0" y="35" text-anchor="middle" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="16" fill="#888">tokens used</text>
  </g>
  
  <g transform="translate(450, 320)">
    <text x="0" y="0" text-anchor="middle" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="48" font-weight="bold" fill="#fff">23.36M</text>
    <text x="0" y="35" text-anchor="middle" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="16" fill="#888">sheep in NZ</text>
  </g>
  
  <g transform="translate(750, 320)">
    <text x="0" y="0" text-anchor="middle" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="48" font-weight="bold" fill="#fff">$431</text>
    <text x="0" y="35" text-anchor="middle" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="16" fill="#888">breeding ram</text>
  </g>
  
  <g transform="translate(1050, 320)">
    <text x="0" y="0" text-anchor="middle" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="48" font-weight="bold" fill="#fff">6.8×</text>
    <text x="0" y="35" text-anchor="middle" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="16" fill="#888">GLM-5.2 cheaper</text>
  </g>
  
  <!-- Bottom tag -->
  <text x="600" y="480" text-anchor="middle" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="24" fill="#555">AI tokens vs sheep vs sheets</text>
  
  <!-- Branding -->
  <text x="600" y="560" text-anchor="middle" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="18" fill="#333">spielos.xyz</text>
</svg>
