  <text x="180" y="205" fill="#fbbf24" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="700" letter-spacing="6">MARGIN WARFARE</text>
  <text x="180" y="365" fill="url(#text)" font-family="Inter, Arial, sans-serif" font-size="116" font-weight="900" letter-spacing="-7">
