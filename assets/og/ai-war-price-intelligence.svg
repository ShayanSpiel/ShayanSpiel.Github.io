<svg xmlns="http://www.w3.org/2000/svg" width="2400" height="1260" viewBox="0 0 2400 1260">
  <defs>
    <radialGradient id="glow" cx="50%" cy="0%" r="72%">
      <stop offset="0" stop-color="#fbbf24" stop-opacity="0.28"/>
      <stop offset="0.42" stop-color="#fbbf24" stop-opacity="0.07"/>
      <stop offset="1" stop-color="#000" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="text" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#777777"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffffff"/>
