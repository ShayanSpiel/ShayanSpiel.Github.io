    <text x="40" y="48" fill="#888" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700" letter-spacing="3">ROUTING SIGNAL</text>
    <text x="40" y="105" fill="#fff" font-family="Inter, Arial, sans-serif" font-size="56" font-weight="900" letter-spacing="-3">65% open-source</text>
