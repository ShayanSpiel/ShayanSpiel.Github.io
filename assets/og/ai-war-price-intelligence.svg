    <tspan x="180" dy="130">Collapsing the Price</tspan>
    <tspan x="180" dy="130">of Intelligence</tspan>
  </text>
  <text x="184" y="795" fill="#b8b8b8" font-family="Inter, Arial, sans-serif" font-size="42" font-weight="500" letter-spacing="-1">
